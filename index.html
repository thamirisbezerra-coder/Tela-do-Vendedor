<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela do Vendedor - Gestão de Feedbacks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* slate-50 */
            color: #1e293b; /* slate-800 */
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            padding: 2px 6px;
            border-radius: 9999px;
            background: #ef4444; /* red-500 */
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(239, 68, 68, 0.3);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .modal-overlay {
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            background-color: rgba(15, 23, 42, 0.6);
        }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="access-view" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-xl border border-slate-100 w-full max-w-md relative overflow-hidden fade-in">
            <!-- Decoração de fundo -->
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 rounded-full bg-emerald-50 opacity-50"></div>
            
            <div class="relative z-10 text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-4 shadow-sm">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Acesso do Vendedor</h1>
                <p class="text-sm text-slate-500 mt-2">Insira os seus dados para ver as suas amostras</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Seu Nome</label>
                    <input type="text" id="seller-name-input" class="w-full border border-slate-200 bg-slate-50 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-colors" placeholder="Digite seu nome completo">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Código PIN</label>
                    <input type="text" id="access-code-input" class="w-full border border-slate-200 bg-slate-50 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:bg-white outline-none transition-colors" placeholder="Código de 6 dígitos">
                </div>
                
                <button id="login-btn" class="w-full bg-emerald-600 text-white font-semibold py-3.5 rounded-xl shadow-md hover:bg-emerald-700 transition-colors mt-4 flex items-center justify-center gap-2">
                    Acessar Painel
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
                <p id="access-error" class="text-red-500 text-sm font-medium text-center h-5 mt-2"></p>
            </div>
        </div>
    </div>

    <!-- TELA DE LOADING (Auto-login) -->
    <div id="loading-state" class="hidden min-h-screen flex flex-col items-center justify-center p-4 text-center">
        <svg class="animate-spin h-10 w-10 text-emerald-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p id="loading-message" class="text-slate-600 font-medium">A conectar ao sistema...</p>
    </div>

    <!-- DASHBOARD PRINCIPAL -->
    <div id="dashboard-view" class="hidden min-h-screen pb-10">
        
        <header class="glass-header sticky top-0 z-30">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-emerald-100 text-emerald-600 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase tracking-wide font-semibold">Vendedor</p>
                        <h2 id="header-seller-name" class="font-bold text-slate-800 text-sm sm:text-base leading-tight">Olá, Vendedor</h2>
                    </div>
                </div>
                
                <div class="flex items-center gap-3 sm:gap-4">
                    <button id="open-notifications-btn" class="relative p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-full transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span id="notification-count" class="notification-badge hidden">0</span>
                    </button>
                    <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                    <button id="logout-btn" class="text-xs font-semibold text-slate-500 hover:text-red-600 transition-colors flex items-center gap-1">
                        Sair <svg class="w-4 h-4 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="container mx-auto px-4 mt-6">
            <!-- Barra de Pesquisa e Filtros -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 sticky top-[72px] z-20">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="relative flex-grow">
                        <svg class="w-5 h-5 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="search-input" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-colors" placeholder="Pesquisar por produto, pedido ou cliente...">
                    </div>
                    <div class="flex p-1 bg-slate-100 rounded-xl w-full sm:w-auto flex-shrink-0">
                        <button id="tab-pending" class="flex-1 sm:flex-none px-6 py-2 text-sm font-semibold rounded-lg bg-white text-slate-800 shadow-sm transition-all">Pendentes</button>
                        <button id="tab-completed" class="flex-1 sm:flex-none px-6 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition-all">Concluídos</button>
                    </div>
                </div>
            </div>

            <!-- Lista de Amostras -->
            <div id="samples-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <!-- Cards injetados via JS -->
            </div>
            
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
                <svg class="w-16 h-16 opacity-50 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <p class="text-lg font-medium text-slate-500">Nenhuma amostra encontrada.</p>
            </div>
        </div>
    </div>

    <!-- MODAL DE FEEDBACK -->
    <div id="feedback-modal" class="fixed inset-0 modal-overlay flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 overflow-hidden flex flex-col max-h-[90vh] fade-in">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-slate-800">Registrar Feedback</h3>
                <button id="close-modal-btn" class="p-1.5 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Resumo do Produto no Modal -->
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-5">
                <p id="modal-product-name" class="font-bold text-slate-800 text-sm"></p>
                <p id="modal-order-number" class="text-xs text-slate-500 mt-1"></p>
            </div>

            <div class="overflow-y-auto pr-1 flex-grow space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Resultado Principal</label>
                    <select id="main-status-select" class="w-full border border-slate-200 bg-slate-50 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="">Selecione o resultado...</option>
                        <option value="Aprovado">Aprovado</option>
                        <option value="Reprovado">Reprovado</option>
                        <option value="Pendente">Pendente / Sem Retorno</option>
                        <option value="Eventos">Eventos / Innovation</option>
                    </select>
                </div>

                <div id="sub-status-container" class="hidden">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Motivo / Detalhe</label>
                    <select id="sub-status-select" class="w-full border border-slate-200 bg-slate-50 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                        <!-- Preenchido via JS -->
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Observações (Opcional)</label>
                    <textarea id="observation-input" rows="3" class="w-full border border-slate-200 bg-slate-50 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none resize-none" placeholder="Detalhes adicionais, comentários do cliente..."></textarea>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-100 flex justify-end gap-3">
                <button id="cancel-feedback-btn" class="bg-slate-100 text-slate-600 font-medium py-2.5 px-5 rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
                <button id="save-feedback-btn" class="bg-emerald-600 text-white font-medium py-2.5 px-6 rounded-xl shadow-sm hover:bg-emerald-700 transition-colors flex items-center gap-2">
                    Salvar Feedback
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL DE NOTIFICAÇÕES (Respostas dos Gestores) -->
    <div id="notifications-modal" class="fixed inset-0 modal-overlay flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 flex flex-col max-h-[85vh] fade-in">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <div class="p-1.5 bg-blue-50 text-blue-600 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg></div>
                    Mensagens da Gestão
                </h3>
                <button id="close-notifications-btn" class="p-1.5 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="notifications-list" class="flex-grow overflow-y-auto space-y-4 pr-2">
                <!-- Notificações via JS -->
            </div>
        </div>
    </div>


    <!-- JAVASCRIPT PRINCIPAL -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, updateDoc, query, where, orderBy, serverTimestamp, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
             apiKey: "AIzaSyAF_TE28Tbp2nakBGTva1yEEbBCqWvRdJQ", 
             authDomain: "feedback-vendedores.firebaseapp.com", 
             projectId: "feedback-vendedores", 
             storageBucket: "feedback-vendedores.firebasestorage.app", 
             messagingSenderId: "650880422749", 
             appId: "1:650880422749:web:54a258964a6ca8db180eb4", 
             measurementId: "G-TG588KDK0C" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- Estado Global ---
        let currentSessionId = null;
        let currentSellerId = null;
        let currentSellerNameOriginal = null;
        let sellerSamples = [];
        let sellerNotifications = [];
        let currentTab = 'pendentes'; 
        let currentEditingSampleId = null;
        let sessionListenerUnsubscribe = null;
        let dataListenerUnsubscribe = null;
        let notificationsListenerUnsubscribe = null;

        const PENDING_STATUSES = ['EM ANÁLISE', 'AMOSTRA SEM FEEDBACK', 'SEM RETORNO DO CLIENTE', 'AMOSTRA NÃO TESTADA', 'PENDENTE'];

        const feedbackOptionsMap = {
            'Aprovado': ['COM PEDIDO', 'APROVADO SEM PEDIDO'],
            'Reprovado': ['APRESENTAÇÃO PRÓ ATIVA', 'CALIBRE', 'EXTRAVIADA', 'FORA DA ESPECIFICAÇÃO DO CLIENTE', 'FORA DO PERFIL DO CLIENTE', 'FRACA / ESTOURANDO / COM CHUVEIRO', 'PRODUTO DESCONTINUADO', 'QUANTIDADE INSUFICIENTE', 'REPRESENTAÇÃO / DISTRIBUIDOR', 'SEM RETORNO DO CLIENTE', 'EXPORTACAO'],
            'Pendente': ['AMOSTRA NÃO TESTADA', 'EM ANÁLISE', 'AMOSTRA SEM FEEDBACK'],
            'Eventos': ['EVENTO', 'INNOVATION / EVENTOS']
        };

        // --- DOM Elements ---
        const accessView = document.getElementById('access-view');
        const loadingState = document.getElementById('loading-state');
        const dashboardView = document.getElementById('dashboard-view');
        
        const sellerNameInput = document.getElementById('seller-name-input');
        const accessCodeInput = document.getElementById('access-code-input');
        const loginBtn = document.getElementById('login-btn');
        const accessError = document.getElementById('access-error');
        const loadingMessage = document.getElementById('loading-message');
        
        const headerSellerName = document.getElementById('header-seller-name');
        const logoutBtn = document.getElementById('logout-btn');
        
        const tabPending = document.getElementById('tab-pending');
        const tabCompleted = document.getElementById('tab-completed');
        const searchInput = document.getElementById('search-input');
        const samplesContainer = document.getElementById('samples-container');
        const emptyState = document.getElementById('empty-state');
        
        const feedbackModal = document.getElementById('feedback-modal');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const cancelFeedbackBtn = document.getElementById('cancel-feedback-btn');
        const saveFeedbackBtn = document.getElementById('save-feedback-btn');
        
        const mainStatusSelect = document.getElementById('main-status-select');
        const subStatusContainer = document.getElementById('sub-status-container');
        const subStatusSelect = document.getElementById('sub-status-select');
        const observationInput = document.getElementById('observation-input');
        
        const modalProductName = document.getElementById('modal-product-name');
        const modalOrderNumber = document.getElementById('modal-order-number');

        const openNotificationsBtn = document.getElementById('open-notifications-btn');
        const notificationCount = document.getElementById('notification-count');
        const notificationsModal = document.getElementById('notifications-modal');
        const closeNotificationsBtn = document.getElementById('close-notifications-btn');
        const notificationsList = document.getElementById('notifications-list');

        // --- Utilidades ---
        const normalizeText = (text = '') => text ? text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim() : '';
        const sanitizeForFirebaseId = (text) => normalizeText(text).replace(/\//g, "-");

        function getFeedbackPrefix(mainStatus) {
            switch(mainStatus) {
                case 'Aprovado': return 'A - ';
                case 'Reprovado': return 'R - ';
                case 'Eventos': return 'E - ';
                case 'Pendente': return 'P - ';
                default: return '';
            }
        }

        // --- Lógica de Login e Sessão ---
        async function attemptLogin(name, code, isAutoLogin = false) {
            try {
                if (!name || !code) throw new Error("Preencha todos os campos.");

                // 1. Obter a sessão ativa global
                const activeSessionRef = doc(db, "configuracoes", "sessaoAtiva");
                const sessionSnap = await getDoc(activeSessionRef);
                
                if (!sessionSnap.exists() || !sessionSnap.data().current) {
                    throw new Error("Não há nenhuma sessão ativa no momento. Aguarde o Gestor.");
                }
                
                const sessionId = sessionSnap.data().current;
                const sanitizedName = sanitizeForFirebaseId(name);
                
                // 2. Verificar o vendedor nesta sessão
                const sellerRef = doc(db, "sessoes", sessionId, "vendedores", sanitizedName);
                const sellerSnap = await getDoc(sellerRef);
                
                if (!sellerSnap.exists()) {
                    throw new Error("Vendedor não encontrado nesta sessão.");
                }
                
                const sellerData = sellerSnap.data();
                
                if (sellerData.accessCode !== code) {
                    throw new Error("Código PIN incorreto.");
                }

                // SUCESSO NO LOGIN
                currentSessionId = sessionId;
                currentSellerId = sanitizedName;
                currentSellerNameOriginal = sellerData.originalName || name;
                
                // Salvar cache V2
                localStorage.setItem('sellerNameV2', name);
                localStorage.setItem('sellerAccessCodeV2', code);
                
                // UI Update
                accessView.classList.add('hidden');
                loadingState.classList.add('hidden');
                dashboardView.classList.remove('hidden');
                headerSellerName.textContent = `Olá, ${currentSellerNameOriginal}`;
                
                // Iniciar Listeners
                startDataListeners();
                return true;

            } catch (err) {
                if (!isAutoLogin) {
                    accessError.textContent = err.message;
                } else {
                    localStorage.removeItem('sellerNameV2');
                    localStorage.removeItem('sellerAccessCodeV2');
                }
                return false;
            }
        }

        loginBtn.addEventListener('click', async () => {
            loginBtn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            await attemptLogin(sellerNameInput.value.trim(), accessCodeInput.value.trim());
            loginBtn.innerHTML = 'Acessar Painel <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>';
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('sellerNameV2');
            localStorage.removeItem('sellerAccessCodeV2');
            window.location.reload();
        });

        // --- Listeners de Dados ---
        function startDataListeners() {
            // 1. Ouvir se a sessão ativa mudar
            const activeSessionRef = doc(db, "configuracoes", "sessaoAtiva");
            sessionListenerUnsubscribe = onSnapshot(activeSessionRef, (docSnap) => {
                const activeId = docSnap.exists() ? docSnap.data().current : null;
                if (activeId !== currentSessionId) {
                    alert("A sessão global foi alterada ou encerrada. A página será recarregada.");
                    window.location.reload();
                }
            });

            // 2. Ouvir dados do Vendedor (Amostras)
            const sellerRef = doc(db, "sessoes", currentSessionId, "vendedores", currentSellerId);
            dataListenerUnsubscribe = onSnapshot(sellerRef, (docSnap) => {
                if (docSnap.exists()) {
                    sellerSamples = docSnap.data().amostras || [];
                    renderCards();
                }
            });

            // 3. Ouvir Notificações
            const notifQuery = query(collection(db, "sessoes", currentSessionId, "notificacoesVendedor"), where("sellerName", "==", currentSellerNameOriginal));
            notificationsListenerUnsubscribe = onSnapshot(notifQuery, (snapshot) => {
                sellerNotifications = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                sellerNotifications.sort((a, b) => (b.timestamp?.toDate() || 0) - (a.timestamp?.toDate() || 0));
                updateNotificationsUI();
            });
        }

        // --- Interface do Dashboard ---
        function switchTab(tab) {
            currentTab = tab;
            if (tab === 'pendentes') {
                tabPending.classList.replace('text-slate-500', 'text-slate-800');
                tabPending.classList.add('bg-white', 'shadow-sm');
                tabCompleted.classList.replace('text-slate-800', 'text-slate-500');
                tabCompleted.classList.remove('bg-white', 'shadow-sm');
            } else {
                tabCompleted.classList.replace('text-slate-500', 'text-slate-800');
                tabCompleted.classList.add('bg-white', 'shadow-sm');
                tabPending.classList.replace('text-slate-800', 'text-slate-500');
                tabPending.classList.remove('bg-white', 'shadow-sm');
            }
            renderCards();
        }

        tabPending.addEventListener('click', () => switchTab('pendentes'));
        tabCompleted.addEventListener('click', () => switchTab('concluidos'));
        searchInput.addEventListener('input', renderCards);

        // *** AQUI ESTÁ A CORREÇÃO PRINCIPAL DOS CARDS ***
        function renderCards() {
            samplesContainer.innerHTML = '';
            const searchTerm = normalizeText(searchInput.value);

            const filteredSamples = sellerSamples.filter(s => {
                let isPending = s.isPending;
                if (typeof isPending === 'undefined') isPending = PENDING_STATUSES.includes(normalizeText(s.originalStatus));
                
                const matchTab = currentTab === 'pendentes' ? isPending : !isPending;
                
                const matchSearch = searchTerm === '' || 
                    normalizeText(s.produto).includes(searchTerm) || 
                    normalizeText(s.pedido).includes(searchTerm) || 
                    normalizeText(s.razaoSocial).includes(searchTerm);

                return matchTab && matchSearch;
            });

            if (filteredSamples.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                filteredSamples.forEach(sample => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow relative fade-in flex flex-col h-full";
                    
                    const isBaixado = sample.systemStatus === 'baixado';
                    const opacityClass = isBaixado ? 'opacity-60' : '';
                    
                    // Estrutura do Cartão
                    card.innerHTML = `
                        <div class="${opacityClass} flex-grow">
                            <!-- Cabeçalho do Card: Produto e Quantidade -->
                            <div class="flex justify-between items-start mb-3 gap-3">
                                <div>
                                    <h3 class="font-bold text-slate-800 text-lg leading-tight">${sample.produto}</h3>
                                    ${sample.descricao ? `<p class="text-xs text-slate-500 mt-1">${sample.descricao}</p>` : ''}
                                </div>
                                <!-- NOVA SOLICITAÇÃO: Qtde substituindo Segmento -->
                                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[11px] font-bold bg-indigo-50 text-indigo-700 border border-indigo-100 whitespace-nowrap flex-shrink-0">
                                    Qtde: ${sample.qtde || '-'}
                                </span>
                            </div>
                            
                            <!-- Detalhes do Pedido -->
                            <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 mb-4">
                                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-1.5">Detalhes do Pedido</p>
                                <p class="text-sm font-medium text-slate-700 flex items-center gap-1.5">
                                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                                    Nº ${sample.pedido}
                                </p>
                                <!-- NOVA SOLICITAÇÃO: Razão Social abaixo do Pedido -->
                                <p class="text-sm font-bold text-blue-600 mt-1.5 flex items-start gap-1.5">
                                    <svg class="w-4 h-4 text-blue-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                                    <span class="truncate" title="${sample.razaoSocial}">${sample.razaoSocial || 'Cliente não informado'}</span>
                                </p>
                            </div>

                            <!-- Feedback Registado (Se concluído) -->
                            ${currentTab === 'concluidos' ? `
                                <div class="mb-4">
                                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Resultado</p>
                                    <p class="text-sm font-medium text-emerald-700 bg-emerald-50 px-2 py-1 rounded inline-block border border-emerald-100">${sample.feedback}</p>
                                    ${sample.observation ? `<p class="text-xs text-slate-600 mt-2 italic bg-slate-50 p-2 rounded border border-slate-100">" ${sample.observation} "</p>` : ''}
                                </div>
                            ` : ''}
                        </div>
                        
                        <!-- Botão de Ação -->
                        <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                            ${isBaixado ? `
                                <span class="text-xs font-semibold text-indigo-600 flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Baixado em Sistema</span>
                            ` : `
                                <span class="text-xs text-slate-400">${sample.emissaoNF ? `Emissão: ${sample.emissaoNF}` : ''}</span>
                                <button class="action-btn bg-${currentTab === 'pendentes' ? 'emerald' : 'slate'}-600 text-white font-medium py-1.5 px-4 rounded-lg shadow-sm hover:bg-${currentTab === 'pendentes' ? 'emerald' : 'slate'}-700 transition-colors text-sm" data-id="${sample.id}">
                                    ${currentTab === 'pendentes' ? 'Dar Feedback' : 'Editar Feedback'}
                                </button>
                            `}
                        </div>
                    `;
                    samplesContainer.appendChild(card);
                });

                document.querySelectorAll('.action-btn').forEach(btn => {
                    btn.addEventListener('click', openFeedbackModal);
                });
            }
        }

        // --- Lógica do Modal de Feedback ---
        function openFeedbackModal(e) {
            currentEditingSampleId = e.target.dataset.id;
            const sample = sellerSamples.find(s => s.id === currentEditingSampleId);
            
            modalProductName.textContent = sample.produto;
            modalOrderNumber.textContent = `Pedido: ${sample.pedido} | Cliente: ${sample.razaoSocial}`;
            
            // Reset modal
            mainStatusSelect.value = '';
            subStatusContainer.classList.add('hidden');
            subStatusSelect.innerHTML = '';
            observationInput.value = sample.observation || '';

            // Se for edição, tentar preencher
            if (sample.feedback) {
                const isPendente = PENDING_STATUSES.includes(normalizeText(sample.feedback.replace('P - ', '')));
                if (sample.feedback.startsWith('A - ') || sample.feedback === 'COM PEDIDO' || sample.feedback === 'APROVADO SEM PEDIDO') {
                    mainStatusSelect.value = 'Aprovado';
                } else if (sample.feedback.startsWith('R - ')) {
                    mainStatusSelect.value = 'Reprovado';
                } else if (sample.feedback.startsWith('E - ')) {
                    mainStatusSelect.value = 'Eventos';
                } else if (sample.feedback.startsWith('P - ') || isPendente) {
                    mainStatusSelect.value = 'Pendente';
                }
                
                updateSubStatusOptions();
                
                const rawSub = sample.feedback.replace(/^[AREP] - /, '');
                if (Array.from(subStatusSelect.options).some(o => o.value === rawSub)) {
                    subStatusSelect.value = rawSub;
                }
            }

            feedbackModal.classList.remove('hidden');
        }

        mainStatusSelect.addEventListener('change', updateSubStatusOptions);

        function updateSubStatusOptions() {
            const main = mainStatusSelect.value;
            if (main && feedbackOptionsMap[main]) {
                subStatusSelect.innerHTML = feedbackOptionsMap[main].map(opt => `<option value="${opt}">${opt}</option>`).join('');
                subStatusContainer.classList.remove('hidden');
            } else {
                subStatusContainer.classList.add('hidden');
            }
        }

        closeModalBtn.addEventListener('click', () => feedbackModal.classList.add('hidden'));
        cancelFeedbackBtn.addEventListener('click', () => feedbackModal.classList.add('hidden'));

        saveFeedbackBtn.addEventListener('click', async () => {
            if (!mainStatusSelect.value) {
                alert("Selecione o Resultado Principal.");
                return;
            }

            const mainStatus = mainStatusSelect.value;
            const subStatus = subStatusSelect.value;
            const observation = observationInput.value.trim();

            const finalFeedbackString = `${getFeedbackPrefix(mainStatus)}${subStatus}`;
            const isPendingCategory = mainStatus === 'Pendente';

            const sampleIndex = sellerSamples.findIndex(s => s.id === currentEditingSampleId);
            if (sampleIndex === -1) return;

            // Criar cópia profunda do array para atualizar o Firestore
            const updatedSamples = JSON.parse(JSON.stringify(sellerSamples));
            const sampleToUpdate = updatedSamples[sampleIndex];

            // Detetar se foi uma edição após conclusão original
            if (!sampleToUpdate.isPending && sampleToUpdate.feedback && sampleToUpdate.feedback !== finalFeedbackString) {
                sampleToUpdate.editedAfterCompletion = true;
            }

            sampleToUpdate.feedback = finalFeedbackString;
            sampleToUpdate.observation = observation;
            sampleToUpdate.isPending = isPendingCategory;
            sampleToUpdate.lastUpdate = Timestamp.now();

            saveFeedbackBtn.disabled = true;
            saveFeedbackBtn.innerHTML = 'A guardar...';

            try {
                const sellerRef = doc(db, "sessoes", currentSessionId, "vendedores", currentSellerId);
                await updateDoc(sellerRef, { amostras: updatedSamples });
                feedbackModal.classList.add('hidden');
            } catch (error) {
                console.error("Erro ao guardar feedback:", error);
                alert("Erro ao guardar. Tente novamente.");
            } finally {
                saveFeedbackBtn.disabled = false;
                saveFeedbackBtn.innerHTML = 'Salvar Feedback';
            }
        });

        // --- Lógica de Notificações ---
        function updateNotificationsUI() {
            const unreadCount = sellerNotifications.filter(n => !n.read).length;
            if (unreadCount > 0) {
                notificationCount.textContent = unreadCount;
                notificationCount.classList.remove('hidden');
                openNotificationsBtn.classList.add('text-blue-600', 'bg-blue-50');
            } else {
                notificationCount.classList.add('hidden');
                openNotificationsBtn.classList.remove('text-blue-600', 'bg-blue-50');
            }
            
            notificationsList.innerHTML = '';
            if (sellerNotifications.length === 0) {
                notificationsList.innerHTML = '<p class="text-slate-400 text-sm text-center py-6">Nenhuma mensagem no momento.</p>';
            } else {
                sellerNotifications.forEach(notif => {
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-xl border ${notif.read ? 'bg-slate-50 border-slate-100' : 'bg-white border-blue-200 shadow-sm'} relative`;
                    
                    const time = notif.timestamp?.toDate() ? notif.timestamp.toDate().toLocaleString('pt-BR') : '';
                    
                    card.innerHTML = `
                        ${!notif.read ? '<div class="absolute top-4 right-4 w-2 h-2 rounded-full bg-blue-500"></div>' : ''}
                        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Referente a: ${notif.produto} <span class="font-normal opacity-70">(Ped: ${notif.pedido})</span></p>
                        <p class="text-sm font-medium text-slate-800 mb-2"><strong>${notif.managerName}</strong> respondeu:</p>
                        <div class="bg-blue-50/50 p-3 rounded-lg border border-blue-100 text-slate-700 text-sm italic mb-3">
                            "${notif.replyMessage}"
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] text-slate-400">${time}</span>
                            <button class="reply-manager-btn text-xs font-bold text-blue-600 hover:text-blue-800 transition-colors py-1 px-2 rounded hover:bg-blue-50" data-notif-id="${notif.id}">Responder</button>
                        </div>
                        
                        <!-- Área de resposta (Oculta por padrão) -->
                        <div id="reply-area-${notif.id}" class="hidden mt-3 pt-3 border-t border-slate-100">
                            <textarea id="reply-text-${notif.id}" class="w-full text-sm border border-slate-200 rounded-lg p-2 mb-2 focus:ring-1 focus:ring-blue-500 outline-none" rows="2" placeholder="Sua resposta..."></textarea>
                            <div class="flex justify-end gap-2">
                                <button class="cancel-reply text-xs text-slate-500 px-2 py-1" data-notif-id="${notif.id}">Cancelar</button>
                                <button class="send-reply-to-manager text-xs font-bold bg-blue-600 text-white px-3 py-1.5 rounded-lg" data-notif-id="${notif.id}" data-manager="${notif.managerName}" data-msg="${notif.replyMessage}" data-prod="${notif.produto}" data-ped="${notif.pedido}">Enviar</button>
                            </div>
                        </div>
                    `;
                    notificationsList.appendChild(card);
                });

                // Attach events for replies
                document.querySelectorAll('.reply-manager-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.notifId;
                        document.getElementById(`reply-area-${id}`).classList.remove('hidden');
                        e.target.classList.add('hidden');
                    });
                });
                
                document.querySelectorAll('.cancel-reply').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.target.dataset.notifId;
                        document.getElementById(`reply-area-${id}`).classList.add('hidden');
                        document.querySelector(`.reply-manager-btn[data-notif-id="${id}"]`).classList.remove('hidden');
                    });
                });

                document.querySelectorAll('.send-reply-to-manager').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.dataset.notifId;
                        const textInput = document.getElementById(`reply-text-${id}`);
                        const replyMsg = textInput.value.trim();
                        
                        if (!replyMsg) return;
                        
                        const button = e.target;
                        button.disabled = true;
                        button.textContent = 'Enviando...';

                        try {
                            await addDoc(collection(db, "sessoes", currentSessionId, "respostasVendedor"), {
                                sellerName: currentSellerNameOriginal,
                                originalManagerName: button.dataset.manager,
                                originalManagerMessage: button.dataset.msg,
                                replyMessage: replyMsg,
                                produto: button.dataset.prod,
                                pedido: button.dataset.ped,
                                timestamp: serverTimestamp(),
                                readByManager: false
                            });
                            
                            // Marca a notificação original como lida
                            await updateDoc(doc(db, "sessoes", currentSessionId, "notificacoesVendedor", id), { read: true });
                            
                            document.getElementById(`reply-area-${id}`).classList.add('hidden');
                            textInput.value = '';
                            
                        } catch (err) {
                            console.error("Erro a enviar resposta", err);
                            button.disabled = false;
                            button.textContent = 'Enviar';
                        }
                    });
                });
            }
        }

        openNotificationsBtn.addEventListener('click', async () => {
            notificationsModal.classList.remove('hidden');
            // Marcar todas como lidas (apenas no UI por agora, a resposta marca no server)
            const unread = sellerNotifications.filter(n => !n.read);
            if(unread.length > 0) {
                 notificationCount.classList.add('hidden');
                 openNotificationsBtn.classList.remove('text-blue-600', 'bg-blue-50');
            }
        });
        
        closeNotificationsBtn.addEventListener('click', () => notificationsModal.classList.add('hidden'));

        // --- Verificação de Login Automático Inicial ---
        async function checkLocalStorage() {
            const savedSellerName = localStorage.getItem('sellerNameV2');
            const savedAccessCode = localStorage.getItem('sellerAccessCodeV2');

            if (savedSellerName && savedAccessCode) {
                 accessView.classList.add('hidden');
                 loadingState.classList.remove('hidden');
                 loadingState.classList.add('flex');
                 const loginSuccess = await attemptLogin(savedSellerName, savedAccessCode, true); 
                 if (!loginSuccess) {
                     accessView.classList.remove('hidden');
                     loadingState.classList.add('hidden');
                     loadingState.classList.remove('flex');
                 }
            } else {
                 accessView.classList.remove('hidden');
                 loadingState.classList.add('hidden');
                 loadingState.classList.remove('flex');
            }
        }

        // Inicialização
        (async () => {
             try {
                 await signInAnonymously(auth); 
                 await checkLocalStorage(); 
             } catch (error) {
                 console.error("Firebase Auth Error:", error);
                 accessError.textContent = "Erro de ligação ao servidor.";
                 accessView.classList.remove('hidden');
                 loadingState.classList.add('hidden');
                 loadingState.classList.remove('flex');
             }
        })();

    </script>
</body>
</html>
